server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA — serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy community data to cgyflask (Flask)
    location /community/ {
        proxy_pass         http://cgyflask:5000/community/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Proxy comparison data to cgydata_express (Express)
    location /compare/ {
        proxy_pass         http://cgydata_express:3000/compare/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
